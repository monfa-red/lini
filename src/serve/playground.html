<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>lini — playground</title>
        <style>
            :root {
                --bg: #0f0f11;
                --panel: #18181b;
                --panel-2: #1f1f23;
                --border: #2a2a30;
                --text: #e4e4e7;
                --muted: #a1a1aa;
                --accent: #6ab7ff;
                --accent-ink: #06223b;
                --warn: #f5c451;
                --err: #ff6b6b;
                --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo,
                    Consolas, monospace;
            }
            * {
                box-sizing: border-box;
            }
            html,
            body {
                margin: 0;
                height: 100%;
            }
            body {
                display: flex;
                flex-direction: column;
                background: var(--bg);
                color: var(--text);
                font:
                    13px/1.5 system-ui,
                    -apple-system,
                    sans-serif;
            }

            /* Tabs — mobile only */
            .tabs {
                display: none;
                flex: 0 0 auto;
                background: var(--panel-2);
                border-bottom: 1px solid var(--border);
            }
            .tab {
                flex: 1;
                padding: 12px;
                background: none;
                border: none;
                color: var(--muted);
                font: inherit;
                font-weight: 600;
                cursor: pointer;
            }
            .tab.active {
                color: var(--text);
                box-shadow: inset 0 -2px 0 var(--accent);
            }

            .panes {
                flex: 1 1 auto;
                display: flex;
                min-height: 0;
            }
            .pane {
                flex: 1 1 50%;
                display: flex;
                flex-direction: column;
                min-width: 0;
                min-height: 0;
            }
            .pane.edit {
                border-right: 1px solid var(--border);
            }

            .toolbar {
                flex: 0 0 auto;
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 8px 12px;
                background: var(--panel-2);
                border-bottom: 1px solid var(--border);
            }
            .brand {
                color: var(--accent);
                font-weight: 700;
                letter-spacing: 0.5px;
            }
            select {
                background: #26262b;
                color: var(--text);
                border: 1px solid var(--border);
                border-radius: 6px;
                padding: 6px 8px;
                font:
                    12px var(--mono);
                max-width: 50vw;
            }
            .dirty {
                color: var(--accent);
                visibility: hidden;
                font-size: 11px;
            }
            .spacer {
                flex: 1;
            }
            button.save {
                padding: 6px 16px;
                border: none;
                border-radius: 6px;
                background: var(--accent);
                color: var(--accent-ink);
                font: inherit;
                font-weight: 600;
                cursor: pointer;
            }
            button.save:disabled {
                background: #2a2a30;
                color: var(--muted);
                cursor: default;
            }

            #editor {
                flex: 1 1 auto;
                width: 100%;
                resize: none;
                border: none;
                outline: none;
                padding: 16px 18px;
                background: var(--panel);
                color: var(--text);
                caret-color: var(--accent);
                font: 13px/1.6 var(--mono);
                tab-size: 2;
            }

            .preview {
                background: #232327;
            }
            #preview {
                flex: 1 1 auto;
                overflow: auto;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
            }
            .card {
                background: #fff;
                border-radius: 8px;
                padding: 16px;
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
            }
            .card svg {
                display: block;
                max-width: 100%;
                height: auto;
            }

            #diag {
                flex: 0 0 auto;
                margin: 0;
                max-height: 30vh;
                overflow: auto;
                padding: 10px 14px;
                background: var(--panel-2);
                border-top: 1px solid var(--border);
                font: 12px/1.5 var(--mono);
                white-space: pre-wrap;
                color: var(--muted);
            }
            #diag:empty {
                display: none;
            }
            #diag.warn {
                color: var(--warn);
            }
            #diag.err {
                color: var(--err);
            }

            @media (max-width: 768px) {
                .tabs {
                    display: flex;
                }
                .pane {
                    display: none;
                }
                .pane.edit {
                    border-right: none;
                }
                body[data-tab="edit"] .pane.edit,
                body[data-tab="preview"] .pane.preview {
                    display: flex;
                }
                select {
                    max-width: 40vw;
                }
            }
        </style>
    </head>
    <body data-tab="edit">
        <div class="tabs">
            <button class="tab active" data-tab="edit">Edit</button>
            <button class="tab" data-tab="preview">Preview</button>
        </div>

        <div class="panes">
            <section class="pane edit">
                <div class="toolbar">
                    <span class="brand">lini</span>
                    <select id="file" title="open a sample"></select>
                    <span class="dirty" id="dirty" title="unsaved changes">●</span>
                    <span class="spacer"></span>
                    <button class="save" id="save" disabled title="write to disk (Ctrl/Cmd-S only renders)">
                        Save
                    </button>
                </div>
                <textarea
                    id="editor"
                    spellcheck="false"
                    autocomplete="off"
                    autocapitalize="off"
                ></textarea>
            </section>

            <section class="pane preview">
                <div id="preview"></div>
            </section>
        </div>

        <pre id="diag"></pre>

        <script>
            const $ = (s) => document.querySelector(s);
            const editor = $("#editor");
            const preview = $("#preview");
            const diag = $("#diag");
            const fileSelect = $("#file");
            const saveBtn = $("#save");
            const dirtyDot = $("#dirty");

            let savedText = "";
            let currentPath = null;
            let dirty = false;

            // ---- transport seam ------------------------------------------
            // The only code that touches the server. A future WASM build swaps
            // these three for an in-browser compile + a baked file manifest;
            // nothing else on the page changes.
            async function listFiles() {
                const t = (await (await fetch("/api/files")).text()).trim();
                return t ? t.split("\n") : [];
            }
            async function loadFile(path) {
                return await (
                    await fetch("/api/file?path=" + encodeURIComponent(path))
                ).text();
            }
            async function compile(source) {
                const r = await fetch("/compile", {
                    method: "POST",
                    body: source,
                });
                return await r.json(); // { ok, svg?, error?, diagnostics }
            }
            async function saveFile(path, source) {
                const r = await fetch("/save?path=" + encodeURIComponent(path), {
                    method: "POST",
                    body: source,
                });
                return await r.json();
            }
            // --------------------------------------------------------------

            const esc = (s) =>
                s.replace(
                    /[&<>"]/g,
                    (c) =>
                        ({
                            "&": "&amp;",
                            "<": "&lt;",
                            ">": "&gt;",
                            '"': "&quot;",
                        })[c],
                );

            function setDirty(d) {
                dirty = d;
                dirtyDot.style.visibility = d ? "visible" : "hidden";
                saveBtn.disabled = !d;
            }

            function showWarnings(list) {
                diag.className = list.length ? "warn" : "";
                diag.textContent = list.join("\n");
            }
            function showError(msg, list = []) {
                preview.innerHTML = "";
                diag.className = "err";
                diag.textContent = [msg, ...list].join("\n");
            }

            let timer = null;
            function scheduleRender() {
                clearTimeout(timer);
                timer = setTimeout(render, 200);
            }
            async function render() {
                clearTimeout(timer);
                let res;
                try {
                    res = await compile(editor.value);
                } catch (e) {
                    showError("fetch failed: " + e.message);
                    return;
                }
                if (res.ok) {
                    preview.innerHTML = '<div class="card">' + res.svg + "</div>";
                    showWarnings(res.diagnostics || []);
                } else {
                    showError(res.error || "compile error", res.diagnostics || []);
                }
            }

            async function open(path, force = false) {
                if (!force && dirty && !confirm("Discard unsaved changes?")) {
                    fileSelect.value = currentPath;
                    return;
                }
                const text = await loadFile(path);
                editor.value = text;
                savedText = text;
                currentPath = path;
                fileSelect.value = path;
                setDirty(false);
                render();
            }

            function showTab(which) {
                document.body.dataset.tab = which;
                document
                    .querySelectorAll(".tab")
                    .forEach((t) =>
                        t.classList.toggle("active", t.dataset.tab === which),
                    );
            }

            editor.addEventListener("input", () => {
                setDirty(editor.value !== savedText);
                scheduleRender();
            });
            fileSelect.addEventListener("change", () => open(fileSelect.value));
            saveBtn.addEventListener("click", async () => {
                if (!currentPath) return;
                const res = await saveFile(currentPath, editor.value);
                if (res.ok) {
                    savedText = editor.value;
                    setDirty(false);
                } else {
                    showError("save failed: " + (res.error || ""));
                }
            });
            // Ctrl/Cmd-S (and -Enter) render immediately — they never write to
            // disk. Saving is the Save button alone, so it can't be a reflex.
            document.addEventListener("keydown", (e) => {
                if (
                    (e.metaKey || e.ctrlKey) &&
                    (e.key === "s" || e.key === "Enter")
                ) {
                    e.preventDefault();
                    render();
                    showTab("preview");
                }
            });
            document
                .querySelectorAll(".tab")
                .forEach((t) =>
                    t.addEventListener("click", () => showTab(t.dataset.tab)),
                );

            (async function init() {
                const files = await listFiles();
                if (!files.length) {
                    fileSelect.innerHTML = "<option>no .lini files</option>";
                    showError("No .lini files in this directory.");
                    return;
                }
                fileSelect.innerHTML = files
                    .map((f) => `<option value="${esc(f)}">${esc(f)}</option>`)
                    .join("");
                open(files[0], true);
            })();
        </script>
    </body>
</html>
